name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download images
        run: python src/fordera/scraper.py

      - name: Preprocess images
        run: python src/fordera/preprocessor.py

      - name: Train classifier
        run: python src/fordera/classifier.py

      - name: Generate Grad-CAM features
        run: python src/fordera/interpretability.py

      - name: Build dichotomous key
        run: python src/fordera/keygen.py

      - name: Run tests
        run: pytest tests/ -v --tb=short
